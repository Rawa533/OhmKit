<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OhmKit | Powering Engineering</title>
  <!-- SEO & Link Preview -->
  <meta name="description" content="OhmKit - Professional toolkit for electrical and electronic engineers. Formulas, calculators, and circuit tools in one place.">
  <link rel="icon" type="image/png" href="img/iconfdg.png">
  <link rel="apple-touch-icon" href="img/iconfdg.png">
  
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rawa.github.io/OhmKit-web/">
  <meta property="og:title" content="OhmKit | Powering Engineering">
  <meta property="og:description" content="Professional toolkit for electrical and electronic engineers. Formulas, calculators, and circuit tools in one place.">
  <meta property="og:image" content="img/LinkPreview.jpg">

  <meta property="twitter:card" content="summary">
  <meta property="twitter:title" content="OhmKit | Powering Engineering">
  <meta property="twitter:description" content="Professional toolkit for electrical and electronic engineers. Formulas, calculators, and circuit tools in one place.">
  <meta property="twitter:image" content="img/LinkPreview.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #0d1a0a 0%, #020502 100%);
      overflow: hidden;
    }

    .splash-container {
      position: relative;
      text-align: center;
      width: 100%;
      max-width: 600px;
      padding: var(--spacing-xl);
      z-index: 10;
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle, black, transparent 80%);
      -webkit-mask-image: radial-gradient(circle, black, transparent 80%);
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to { background-position: 40px 40px; }
    }

    .logo-container {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto var(--spacing-xl);
      animation: logoEntrance 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes logoEntrance {
      from { opacity: 0; transform: scale(0.5) translateY(40px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .logo-glow {
      position: absolute;
      inset: -20px;
      background: var(--primary-glow);
      filter: blur(40px);
      border-radius: 50%;
      animation: pulse 3s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.2); opacity: 0.7; }
    }

    .logo-img {
      position: relative;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 15px var(--primary-glow));
    }

    .title-group {
      animation: fadeIn 1s ease 0.5s both;
    }

    .title-top {
      font-family: var(--font-cond);
      font-weight: 900;
      font-size: clamp(24px, 5vw, 32px);
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--secondary);
      margin-bottom: -5px;
    }

    .title-main {
      font-family: var(--font-accent);
      font-size: clamp(64px, 12vw, 100px);
      letter-spacing: 4px;
      color: var(--primary);
      line-height: 1;
      text-shadow: 0 0 20px var(--primary-glow);
    }

    .tagline {
      font-family: var(--font-main);
      color: var(--text-dim);
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: var(--spacing-md);
    }

    .loader {
      margin-top: 60px;
      width: 240px;
      margin-left: auto;
      margin-right: auto;
    }

    .loader-track {
      height: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 10px;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary-dark), var(--primary), var(--secondary));
      box-shadow: 0 0 10px var(--primary-glow);
      animation: load 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes load {
      to { width: 100%; }
    }

    .no-connection {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-xl);
    }

    .no-connection.show { display: flex; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="splash-container">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <img src="img/iconfdg.png" alt="OhmKit Logo" class="logo-img">
    </div>

    <div class="title-group">
      <div class="title-top">Electric Engineering</div>
      <div class="title-main">OHMKIT</div>
      <div class="tagline">Powering Your Precision</div>
    </div>

    <div class="loader">
      <div style="font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px;">Initializing Core</div>
      <div class="loader-track">
        <div class="loader-bar"></div>
      </div>
    </div>
  </div>

  <div class="no-connection" id="noInternet">
    <div class="card" style="width: 100%; max-width: 320px; text-align: center; cursor: default;">
      <div style="font-size: 48px; margin-bottom: 20px;">📡</div>
      <h2 class="card-title" style="color: var(--secondary);">No Connection</h2>
      <p style="color: var(--text-muted); margin: 15px 0;">Please check your internet connection to access the toolkit.</p>
      <button class="btn btn-primary" onclick="window.location.reload()">Retry</button>
    </div>
  </div>

  <script>
    const startApp = () => {
      setTimeout(() => {
        window.location.href = 'MainScreen/Home/main_screen.html';
      }, 3000);
    };

    if (!navigator.onLine) {
      document.getElementById('noInternet').classList.add('show');
    } else {
      startApp();
    }

    window.addEventListener('offline', () => {
      document.getElementById('noInternet').classList.add('show');
    });
  </script>
</body>
</html>
