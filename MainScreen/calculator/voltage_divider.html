<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OhmKit | Voltage Divider</title>
  <meta name="description" content="Calculate output voltage for resistor dividers - OhmKit Engineering Toolkit.">
  
  <!-- SEO & Link Preview -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rawa.github.io/OhmKit-web/">
  <meta property="og:title" content="OhmKit | Voltage Divider">
  <meta property="og:description" content="Calculate output voltage for resistor dividers - OhmKit Engineering Toolkit.">
  <meta property="og:image" content="../../img/LinkPreview.jpg">

  <meta property="twitter:card" content="summary">
  <meta property="twitter:title" content="OhmKit | Voltage Divider">
  <meta property="twitter:description" content="Calculate output voltage for resistor dividers - OhmKit Engineering Toolkit.">
  <meta property="twitter:image" content="../../img/LinkPreview.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/theme.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/components.css">
  <style>
    .tool-container {
      padding: var(--spacing-lg);
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div class="tool-container animate-slide">
        <div class="card" style="margin-bottom: var(--spacing-xl); cursor: default;">
          <p style="color: var(--text-muted); font-size: 14px;">Calculate Output Voltage (Vout) for a simple resistor divider circuit.</p>
        </div>

        <div class="input-group">
          <label class="input-label">Input Voltage (Vin) — Volts</label>
          <input type="number" id="inputVin" class="input-field" placeholder="e.g. 5" step="any">
        </div>
        
        <div class="input-group">
          <label class="input-label">Resistor 1 (R1) — Ohms (Ω)</label>
          <input type="number" id="inputR1" class="input-field" placeholder="e.g. 1000" step="any">
        </div>
        
        <div class="input-group">
          <label class="input-label">Resistor 2 (R2) — Ohms (Ω)</label>
          <input type="number" id="inputR2" class="input-field" placeholder="e.g. 2000" step="any">
        </div>

        <div style="display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-xl);">
          <button class="btn btn-outline" onclick="clearFields()" style="flex:1;">Clear</button>
          <button class="btn btn-primary" onclick="calculate()" style="flex:2;">Calculate Vout</button>
        </div>

        <div class="result-container">
          <div class="result-header">Calculation Results</div>
          <div class="result-row">
            <span class="result-label">Output Voltage (Vout)</span>
            <span class="result-value" id="resVout">-</span>
          </div>
        </div>

        <div class="formula-container">
          <div class="formula-title">Reference Formula</div>
          Vout = Vin × [ R2 / (R1 + R2) ]
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/layout.js"></script>
  <script>
    LayoutManager.init({
      title: "Voltage Divider",
      activeId: 'calculators',
      rootPath: '../../',
      noFavorite: true,
      tool: {
        id: "voltage_divider",
        name: "Voltage Divider",
        url: "MainScreen/calculator/voltage_divider.html",
        icon: "📈",
        sub: "Calculate Vout"
      }
    });

    function formatRes(val, unit) {
      if(!isFinite(val)) return "-";
      return val.toFixed(4).replace(/\.?0+$/, '') + ' ' + unit;
    }

    function clearFields() {
      document.getElementById('inputVin').value = '';
      document.getElementById('inputR1').value = '';
      document.getElementById('inputR2').value = '';
      document.getElementById('resVout').innerText = '-';
    }

    function calculate() {
      let vin = parseFloat(document.getElementById('inputVin').value);
      let r1 = parseFloat(document.getElementById('inputR1').value);
      let r2 = parseFloat(document.getElementById('inputR2').value);

      if (isNaN(vin) || isNaN(r1) || isNaN(r2)) {
        alert("Please enter all three values.");
        return;
      }

      if (r1 + r2 === 0) {
        alert("Resistance sum cannot be zero.");
        return;
      }

      let vout = vin * (r2 / (r1 + r2));
      document.getElementById('resVout').innerText = formatRes(vout, 'V');
    }
  </script>
</body>
</html>
