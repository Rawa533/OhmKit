<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OhmKit | Ohm's Law</title>
  <meta name="description" content="Calculate Voltage, Current, and Resistance - OhmKit Engineering Toolkit.">
  
  <!-- SEO & Link Preview -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rawa.github.io/OhmKit-web/">
  <meta property="og:title" content="OhmKit | Ohm's Law">
  <meta property="og:description" content="Calculate Voltage, Current, and Resistance - OhmKit Engineering Toolkit.">
  <meta property="og:image" content="../../img/LinkPreview.jpg">

  <meta property="twitter:card" content="summary">
  <meta property="twitter:title" content="OhmKit | Ohm's Law">
  <meta property="twitter:description" content="Calculate Voltage, Current, and Resistance - OhmKit Engineering Toolkit.">
  <meta property="twitter:image" content="../../img/LinkPreview.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/theme.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/components.css">
  <style>
    .tool-container {
      padding: var(--spacing-lg);
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div class="tool-container animate-slide">
        <div class="card" style="margin-bottom: var(--spacing-xl); cursor: default;">
          <p style="color: var(--text-muted); font-size: 14px;">Enter any two values to calculate the third using Ohm's Law (V = I × R).</p>
        </div>

        <div class="input-group">
          <label class="input-label">Voltage (V) — Volts</label>
          <input type="number" id="inputV" class="input-field" placeholder="e.g. 12" step="any">
        </div>
        
        <div class="input-group">
          <label class="input-label">Current (I) — Amperes</label>
          <input type="number" id="inputI" class="input-field" placeholder="e.g. 2" step="any">
        </div>
        
        <div class="input-group">
          <label class="input-label">Resistance (R) — Ohms (Ω)</label>
          <input type="number" id="inputR" class="input-field" placeholder="e.g. 6" step="any">
        </div>

        <div style="display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-xl);">
          <button class="btn btn-outline" onclick="clearFields()">Clear</button>
          <button class="btn btn-primary" onclick="calculate()">Calculate</button>
        </div>

        <div class="result-container">
          <div class="result-header">Calculation Results</div>
          <div class="result-row">
            <span class="result-label">Voltage (V)</span>
            <span class="result-value" id="resV">-</span>
          </div>
          <div class="result-row">
            <span class="result-label">Current (I)</span>
            <span class="result-value" id="resI">-</span>
          </div>
          <div class="result-row">
            <span class="result-label">Resistance (R)</span>
            <span class="result-value" id="resR">-</span>
          </div>
        </div>

        <div class="formula-container">
          <div class="formula-title">Reference Formulas</div>
          V = I × R | I = V / R | R = V / I
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/layout.js"></script>
  <script>
    LayoutManager.init({
      title: "Ohm's Law",
      activeId: 'calculators',
      rootPath: '../../',
      tool: {
        id: "ohms_law",
        name: "Ohm's Law",
        url: "MainScreen/calculator/ohms_law.html",
        icon: "⚡",
        sub: "Voltage, Current, Resistance"
      }
    });

    function formatRes(val, unit) {
      if(!isFinite(val)) return "-";
      return val.toFixed(4).replace(/\.?0+$/, '') + ' ' + unit;
    }

    function clearFields() {
      document.getElementById('inputV').value = '';
      document.getElementById('inputI').value = '';
      document.getElementById('inputR').value = '';
      document.getElementById('resV').innerText = '-';
      document.getElementById('resI').innerText = '-';
      document.getElementById('resR').innerText = '-';
    }

    function calculate() {
      const vStr = document.getElementById('inputV').value;
      const iStr = document.getElementById('inputI').value;
      const rStr = document.getElementById('inputR').value;
      
      let v = parseFloat(vStr);
      let i = parseFloat(iStr);
      let r = parseFloat(rStr);
      
      let vNaN = isNaN(v);
      let iNaN = isNaN(i);
      let rNaN = isNaN(r);
      
      let count = (!vNaN ? 1 : 0) + (!iNaN ? 1 : 0) + (!rNaN ? 1 : 0);
      
      if (count < 2) { alert("Please enter exactly two values."); return; }
      if (count === 3) { alert("Please enter exactly two values. One field must be left empty."); return; }
      
      if (vNaN) {
        v = i * r;
        document.getElementById('inputV').value = v.toFixed(4).replace(/\.?0+$/, '');
      } else if (iNaN) {
        if (r === 0) { alert("Resistance cannot be zero."); return; }
        i = v / r;
        document.getElementById('inputI').value = i.toFixed(4).replace(/\.?0+$/, '');
      } else if (rNaN) {
        if (i === 0) { alert("Current cannot be zero."); return; }
        r = v / i;
        document.getElementById('inputR').value = r.toFixed(4).replace(/\.?0+$/, '');
      }
      
      document.getElementById('resV').innerText = formatRes(v, 'V');
      document.getElementById('resI').innerText = formatRes(i, 'A');
      document.getElementById('resR').innerText = formatRes(r, 'Ω');
    }
  </script>
</body>
</html>
