<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OhmKit | Antenna Calc</title>
  <meta name="description" content="Calculate antenna length and resonance frequency - OhmKit Engineering Toolkit.">
  
  <!-- SEO & Link Preview -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rawa.github.io/OhmKit-web/">
  <meta property="og:title" content="OhmKit | Antenna Calc">
  <meta property="og:description" content="Calculate antenna length and resonance frequency - OhmKit Engineering Toolkit.">
  <meta property="og:image" content="../../img/LinkPreview.jpg">

  <meta property="twitter:card" content="summary">
  <meta property="twitter:title" content="OhmKit | Antenna Calc">
  <meta property="twitter:description" content="Calculate antenna length and resonance frequency - OhmKit Engineering Toolkit.">
  <meta property="twitter:image" content="../../img/LinkPreview.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/theme.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/components.css">
  <style>
    .tool-container {
      padding: var(--spacing-lg);
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div class="tool-container animate-slide">
        <div class="card" style="margin-bottom: var(--spacing-xl); cursor: default;">
          <p style="color: var(--text-muted); font-size: 14px;">Calculate wavelength and antenna lengths based on frequency.</p>
        </div>

        <div class="input-group">
          <label class="input-label">Frequency (f) - MHz</label>
          <input type="number" id="freq" class="input-field" placeholder="e.g. 144" step="any">
        </div>

        <div style="display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-xl);">
          <button class="btn btn-outline" onclick="clearFields()" style="flex:1;">Clear</button>
          <button class="btn btn-primary" onclick="calculateAntenna()" style="flex:2;">Calculate</button>
        </div>

        <div class="result-container">
          <div class="result-header">Results</div>
          <div class="result-row">
            <span class="result-label">Full Wavelength (λ)</span>
            <span class="result-value" id="wl">- m</span>
          </div>
          <div class="result-row">
            <span class="result-label">Half Wave (λ/2)</span>
            <span class="result-value" id="hwl">- m</span>
          </div>
          <div class="result-row">
            <span class="result-label">Quarter Wave (λ/4)</span>
            <span class="result-value" id="qwl">- m</span>
          </div>
        </div>

        <div class="formula-container">
          <div class="formula-title">Formulas Used</div>
          <div style="font-size: 13px; color: var(--text-muted); line-height: 1.6;">
            λ = c / f<br>
            Half Wave = λ / 2<br>
            Quarter Wave = λ / 4
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/layout.js"></script>
  <script>
    LayoutManager.init({
      title: "Antenna Calc",
      activeId: 'circuits',
      rootPath: '../../',
      tool: {
        id: "antenna_calc",
        name: "Antenna Calc",
        url: "MainScreen/Circuit/Antenna_Calc.html",
        icon: "📡",
        sub: "Wavelength & length calculator"
      }
    });

    function clearFields() {
      document.getElementById('freq').value = '';
      document.getElementById('wl').innerText = '- m';
      document.getElementById('hwl').innerText = '- m';
      document.getElementById('qwl').innerText = '- m';
    }

    function calculateAntenna() {
      const f = parseFloat(document.getElementById('freq').value);
      if(isNaN(f) || f <= 0) {
        alert("Please enter a valid positive Frequency in MHz.");
        return;
      }

      const c = 299.792458; // if f is in MHz, wave in meters
      const wl = c / f;
      const hwl = wl / 2;
      const qwl = wl / 4;

      document.getElementById('wl').innerText = wl.toFixed(3) + " m";
      document.getElementById('hwl').innerText = hwl.toFixed(3) + " m";
      document.getElementById('qwl').innerText = qwl.toFixed(3) + " m";
    }
  </script>
</body>
</html>
