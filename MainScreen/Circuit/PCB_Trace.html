<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OhmKit | PCB Trace Width</title>
  <meta name="description" content="Calculate PCB trace width for desired current and temperature rise - OhmKit Engineering Toolkit.">
  
  <!-- SEO & Link Preview -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rawa.github.io/OhmKit-web/">
  <meta property="og:title" content="OhmKit | PCB Trace Width">
  <meta property="og:description" content="Calculate PCB trace width for desired current and temperature rise - OhmKit Engineering Toolkit.">
  <meta property="og:image" content="../../img/LinkPreview.jpg">

  <meta property="twitter:card" content="summary">
  <meta property="twitter:title" content="OhmKit | PCB Trace Width">
  <meta property="twitter:description" content="Calculate PCB trace width for desired current and temperature rise - OhmKit Engineering Toolkit.">
  <meta property="twitter:image" content="../../img/LinkPreview.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/theme.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/components.css">
  <style>
    .tool-container {
      padding: var(--spacing-lg);
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div class="tool-container animate-slide">
        <div class="card" style="margin-bottom: var(--spacing-xl); cursor: default;">
          <p style="color: var(--text-muted); font-size: 14px;">Calculate required PCB trace width based on current, copper thickness, and temperature rise (IPC-2221).</p>
        </div>

        <div class="input-group">
          <label class="input-label">Current (Amps)</label>
          <input type="number" id="current" class="input-field" placeholder="e.g. 1" step="any">
        </div>
        <div class="input-group">
          <label class="input-label">Copper Weight (oz/ft²)</label>
          <input type="number" id="thickness" class="input-field" placeholder="e.g. 1" value="1" step="any">
        </div>
        <div class="input-group">
          <label class="input-label">Temperature Rise (°C)</label>
          <input type="number" id="tempRise" class="input-field" placeholder="e.g. 10" value="10" step="any">
        </div>

        <div style="display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-xl);">
          <button class="btn btn-outline" onclick="clearFields()" style="flex:1;">Clear</button>
          <button class="btn btn-primary" onclick="calculateTrace()" style="flex:2;">Calculate</button>
        </div>

        <div class="result-container">
          <div class="result-header">Results</div>
          <div class="result-row">
            <span class="result-label">Internal Trace Width</span>
            <span class="result-value" id="internalWidth">- mils (- mm)</span>
          </div>
          <div class="result-row">
            <span class="result-label">External Trace Width</span>
            <span class="result-value" id="externalWidth">- mils (- mm)</span>
          </div>
        </div>

        <div class="formula-container">
          <div class="formula-title">Formulas Used (IPC-2221)</div>
          <p style="font-size: 13px; color: var(--text-muted); line-height: 1.4;">
            Area = (I / (k × ΔT<sup>0.44</sup>))<sup>(1/0.725)</sup><br>
            Width = Area / (Thickness × 1.378)
          </p>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/layout.js"></script>
  <script>
    LayoutManager.init({
      title: "PCB Trace Width",
      activeId: 'circuits',
      rootPath: '../../',
      tool: {
        id: "pcb_trace",
        name: "PCB Trace Width",
        url: "MainScreen/Circuit/PCB_Trace.html",
        icon: "📏",
        sub: "Trace width calculator"
      }
    });

    function clearFields() {
      document.getElementById('current').value = '';
      document.getElementById('thickness').value = '1';
      document.getElementById('tempRise').value = '10';
      document.getElementById('internalWidth').innerText = '- mils (- mm)';
      document.getElementById('externalWidth').innerText = '- mils (- mm)';
    }

    function calculateTrace() {
      const I = parseFloat(document.getElementById('current').value);
      const dT = parseFloat(document.getElementById('tempRise').value);
      const Th = parseFloat(document.getElementById('thickness').value);

      if(isNaN(I) || isNaN(dT) || isNaN(Th) || I <= 0) {
        alert("Please enter valid positive numbers.");
        return;
      }

      let areaInternal = Math.pow((I / (0.024 * Math.pow(dT, 0.44))), (1 / 0.725));
      let widthInternal = areaInternal / (Th * 1.378);

      let areaExternal = Math.pow((I / (0.048 * Math.pow(dT, 0.44))), (1 / 0.725));
      let widthExternal = areaExternal / (Th * 1.378);

      let widthInternal_mm = widthInternal * 0.0254;
      let widthExternal_mm = widthExternal * 0.0254;

      document.getElementById('internalWidth').innerText = widthInternal.toFixed(2) + " mils (" + widthInternal_mm.toFixed(3) + " mm)";
      document.getElementById('externalWidth').innerText = widthExternal.toFixed(2) + " mils (" + widthExternal_mm.toFixed(3) + " mm)";
    }
  </script>
</body>
</html>
