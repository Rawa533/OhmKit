<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OhmKit | 555 Timer</title>
  <meta name="description" content="Calculate frequency and duty cycle for 555 timer circuits - OhmKit Engineering Toolkit.">
  
  <!-- SEO & Link Preview -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rawa.github.io/OhmKit-web/">
  <meta property="og:title" content="OhmKit | 555 Timer">
  <meta property="og:description" content="Calculate frequency and duty cycle for 555 timer circuits - OhmKit Engineering Toolkit.">
  <meta property="og:image" content="../../img/LinkPreview.jpg">

  <meta property="twitter:card" content="summary">
  <meta property="twitter:title" content="OhmKit | 555 Timer">
  <meta property="twitter:description" content="Calculate frequency and duty cycle for 555 timer circuits - OhmKit Engineering Toolkit.">
  <meta property="twitter:image" content="../../img/LinkPreview.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/theme.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/components.css">
  <style>
    .tool-container {
      padding: var(--spacing-lg);
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div class="tool-container animate-slide">
        <div class="card" style="margin-bottom: var(--spacing-xl); cursor: default;">
          <p style="color: var(--text-muted); font-size: 14px;">Calculate frequency and duty cycle for a 555 timer in astable mode.</p>
        </div>

        <div class="input-group">
          <label class="input-label">Resistor 1 (R1) - kΩ</label>
          <input type="number" id="r1" class="input-field" placeholder="e.g. 1" step="any">
        </div>
        <div class="input-group">
          <label class="input-label">Resistor 2 (R2) - kΩ</label>
          <input type="number" id="r2" class="input-field" placeholder="e.g. 10" step="any">
        </div>
        <div class="input-group">
          <label class="input-label">Capacitor (C) - µF</label>
          <input type="number" id="c" class="input-field" placeholder="e.g. 10" step="any">
        </div>

        <div style="display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-xl);">
          <button class="btn btn-outline" onclick="clearFields()" style="flex:1;">Clear</button>
          <button class="btn btn-primary" onclick="calculate555()" style="flex:2;">Calculate Astable</button>
        </div>

        <div class="result-container">
          <div class="result-header">Results</div>
          <div class="result-row">
            <span class="result-label">Frequency</span>
            <span class="result-value" id="freq">- Hz</span>
          </div>
          <div class="result-row">
            <span class="result-label">Duty Cycle</span>
            <span class="result-value" id="duty">- %</span>
          </div>
          <div class="result-row">
            <span class="result-label">Time High (t1)</span>
            <span class="result-value" id="thigh">- ms</span>
          </div>
          <div class="result-row">
            <span class="result-label">Time Low (t2)</span>
            <span class="result-value" id="tlow">- ms</span>
          </div>
        </div>

        <div class="formula-container">
          <div class="formula-title">Formulas Used (Astable)</div>
          <div style="font-size: 13px; color: var(--text-muted); line-height: 1.6;">
            f = 1.44 / ((R1 + 2×R2) × C)<br>
            Duty Cycle = (R1 + R2) / (R1 + 2×R2) × 100%
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/layout.js"></script>
  <script>
    LayoutManager.init({
      title: "555 Timer",
      activeId: 'circuits',
      rootPath: '../../',
      tool: {
        id: "555_timer",
        name: "555 Timer",
        url: "MainScreen/Circuit/555_timer.html",
        icon: "⏱️",
        sub: "Astable mode calculator"
      }
    });

    function clearFields() {
      document.getElementById('r1').value = '';
      document.getElementById('r2').value = '';
      document.getElementById('c').value = '';
      document.getElementById('freq').innerText = '- Hz';
      document.getElementById('duty').innerText = '- %';
      document.getElementById('thigh').innerText = '- ms';
      document.getElementById('tlow').innerText = '- ms';
    }

    function calculate555() {
      let R1 = parseFloat(document.getElementById('r1').value);
      let R2 = parseFloat(document.getElementById('r2').value);
      let C = parseFloat(document.getElementById('c').value);

      if(isNaN(R1) || isNaN(R2) || isNaN(C) || R1 <= 0 || R2 <= 0 || C <= 0) {
        alert("Please enter valid positive numbers for R1, R2, and C.");
        return;
      }

      R1 = R1 * 1000;
      R2 = R2 * 1000;
      C = C * 1e-6;

      const freq = 1.44 / ((R1 + 2 * R2) * C);
      const duty = ((R1 + R2) / (R1 + 2 * R2)) * 100;
      const tHigh = 0.693 * (R1 + R2) * C;
      const tLow = 0.693 * R2 * C;

      document.getElementById('freq').innerText = formatValue(freq) + "Hz";
      document.getElementById('duty').innerText = duty.toFixed(2) + " %";
      document.getElementById('thigh').innerText = (tHigh * 1000).toFixed(2) + " ms";
      document.getElementById('tlow').innerText = (tLow * 1000).toFixed(2) + " ms";
    }

    function formatValue(value) {
      if (value >= 1e6) {
          return (value / 1e6).toFixed(2) + " M";
      } else if (value >= 1e3) {
          return (value / 1e3).toFixed(2) + " k";
      } else {
          return value.toFixed(2) + " ";
      }
    }
  </script>
</body>
</html>
