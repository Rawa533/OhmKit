<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OhmKit | RC Filter Calc</title>
  <meta name="description" content="Calculate cutoff frequency for RC and RL filters - OhmKit Engineering Toolkit.">
  
  <!-- SEO & Link Preview -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rawa.github.io/OhmKit-web/">
  <meta property="og:title" content="OhmKit | RC Filter Calc">
  <meta property="og:description" content="Calculate cutoff frequency for RC and RL filters - OhmKit Engineering Toolkit.">
  <meta property="og:image" content="../../img/LinkPreview.jpg">

  <meta property="twitter:card" content="summary">
  <meta property="twitter:title" content="OhmKit | RC Filter Calc">
  <meta property="twitter:description" content="Calculate cutoff frequency for RC and RL filters - OhmKit Engineering Toolkit.">
  <meta property="twitter:image" content="../../img/LinkPreview.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/theme.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/components.css">
  <style>
    .tool-container {
      padding: var(--spacing-lg);
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div class="tool-container animate-slide">
        <div class="card" style="margin-bottom: var(--spacing-xl); cursor: default;">
          <p style="color: var(--text-muted); font-size: 14px;">Calculate the -3dB cutoff frequency (fc) and time constant (τ) for a passive RC filter.</p>
        </div>

        <div class="input-group">
          <label class="input-label">Resistor (R) - Ω</label>
          <input type="number" id="r" class="input-field" placeholder="e.g. 1000" step="any">
        </div>
        <div class="input-group">
          <label class="input-label">Capacitor (C) - µF</label>
          <input type="number" id="c" class="input-field" placeholder="e.g. 1" step="any">
        </div>

        <div style="display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-xl);">
          <button class="btn btn-outline" onclick="clearFields()" style="flex:1;">Clear</button>
          <button class="btn btn-primary" onclick="calculateFilter()" style="flex:2;">Calculate Cutoff (fc)</button>
        </div>

        <div class="result-container">
          <div class="result-header">Results</div>
          <div class="result-row">
            <span class="result-label">Cutoff Frequency</span>
            <span class="result-value" id="cutoffFreq">- Hz</span>
          </div>
          <div class="result-row">
            <span class="result-label">Time Constant (τ)</span>
            <span class="result-value" id="tau">- ms</span>
          </div>
        </div>

        <div class="formula-container">
          <div class="formula-title">Formulas Used</div>
          <div style="font-size: 13px; color: var(--text-muted); line-height: 1.6;">
            fc = 1 / (2π × R × C)<br>
            τ = R × C
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/layout.js"></script>
  <script>
    LayoutManager.init({
      title: "RC Filter Calc",
      activeId: 'circuits',
      rootPath: '../../',
      tool: {
        id: "filter_calc",
        name: "Filter Calc",
        url: "MainScreen/Circuit/Filter_Calc.html",
        icon: "📉",
        sub: "RC cutoff calculator"
      }
    });

    function clearFields() {
      document.getElementById('r').value = '';
      document.getElementById('c').value = '';
      document.getElementById('cutoffFreq').innerText = '- Hz';
      document.getElementById('tau').innerText = '- ms';
    }

    function calculateFilter() {
      let R = parseFloat(document.getElementById('r').value);
      let C = parseFloat(document.getElementById('c').value);

      if(isNaN(R) || isNaN(C) || R <= 0 || C <= 0) {
        alert("Please enter valid positive numbers for R and C.");
        return;
      }

      let C_Farad = C * 1e-6;
      const freq = 1 / (2 * Math.PI * R * C_Farad);
      const tau = R * C_Farad;

      document.getElementById('cutoffFreq').innerText = formatValue(freq) + "Hz";
      document.getElementById('tau').innerText = (tau * 1000).toFixed(2) + " ms";
    }

    function formatValue(value) {
      if (value >= 1e6) {
          return (value / 1e6).toFixed(2) + " M";
      } else if (value >= 1e3) {
          return (value / 1e3).toFixed(2) + " k";
      } else {
          return value.toFixed(2) + " ";
      }
    }
  </script>
</body>
</html>
